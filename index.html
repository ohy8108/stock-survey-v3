<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 투자형일까, 투기형일까?</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9fafb;
    --bg-white: #ffffff;
    --primary: #3182f6;
    --primary-light: #e8f3ff;
    --primary-dark: #1b64da;
    --text: #191f28;
    --text-sub: #4e5968;
    --text-dim: #8b95a1;
    --border: #f2f4f6;
    --border-mid: #e5e8eb;
    --red: #f04452;
    --red-light: #fff0f1;
    --green: #00c896;
    --green-light: #e8f9f3;
    --yellow: #fbbc04;
    --shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg-white);
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.04);
  }
  .topbar {
    position: sticky; top: 0;
    background: var(--bg-white);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar .logo { font-size: 17px; font-weight: 700; color: var(--primary); }
  .topbar .step-indicator { margin-left: auto; font-size: 13px; color: var(--text-dim); font-weight: 500; }
  .progress-track { height: 3px; background: var(--border); overflow: hidden; }
  .progress-fill {
    height: 100%; background: var(--primary);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0%;
  }
  .content {
    padding: 24px 24px 140px;
    animation: fadeUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .label-tag {
    display: inline-block;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px;
    margin-bottom: 12px;
  }
  h1.title {
    font-size: 24px; font-weight: 700;
    line-height: 1.35; margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 15px; color: var(--text-sub);
    margin-bottom: 24px; line-height: 1.5;
  }

  /* === Intro === */
  .intro-hero {
    background: linear-gradient(135deg, #3182f6 0%, #5e9eff 100%);
    border-radius: 20px; padding: 36px 28px;
    color: white; text-align: center;
    margin-bottom: 24px; position: relative; overflow: hidden;
  }
  .intro-hero::before {
    content: ''; position: absolute;
    top: -50%; right: -30%;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  .intro-hero .money { font-size: 48px; margin-bottom: 8px; position: relative; }
  .intro-hero h2 {
    font-size: 26px; font-weight: 700; margin-bottom: 8px;
    position: relative; letter-spacing: -0.5px;
  }
  .intro-hero p { font-size: 14px; opacity: 0.92; position: relative; }

  .feature-list {
    background: var(--bg); border-radius: 16px;
    padding: 20px; margin-bottom: 24px;
  }
  .feature-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; }
  .feature-item .num {
    background: var(--primary); color: white;
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .feature-item .text { font-size: 14px; color: var(--text-sub); line-height: 1.5; }
  .feature-item .text strong { color: var(--text); font-weight: 600; }

  /* === Portfolio === */
  .portfolio-bar {
    background: var(--text); color: white;
    border-radius: 16px; padding: 18px 20px;
    margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .portfolio-bar .left .label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
  .portfolio-bar .left .amount { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .portfolio-bar .right { text-align: right; }
  .portfolio-bar .right .change { font-size: 15px; font-weight: 700; }
  .portfolio-bar .right .change.up { color: #ff6b76; }
  .portfolio-bar .right .change.down { color: #5fb4ff; }
  .portfolio-bar .right .label { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  /* === Owned Stock Highlight === */
  .my-stock-card {
    background: linear-gradient(135deg, #e8f3ff 0%, #f5faff 100%);
    border: 2px solid var(--primary);
    border-radius: 16px; padding: 18px;
    margin-bottom: 16px;
    position: relative;
  }
  .my-stock-card .owned-tag {
    position: absolute; top: 14px; right: 14px;
    background: var(--primary); color: white;
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 6px;
  }
  .my-stock-card .label-small {
    font-size: 11px; color: var(--primary-dark);
    font-weight: 600; margin-bottom: 4px;
  }
  .my-stock-card .name {
    font-size: 18px; font-weight: 700; margin-bottom: 2px;
  }
  .my-stock-card .industry { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
  .my-stock-card .price-row {
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .my-stock-card .price-row .price-now { font-size: 22px; font-weight: 700; }
  .my-stock-card .price-row .change-info { text-align: right; }
  .my-stock-card .price-row .change-info .week { font-size: 14px; font-weight: 700; }
  .my-stock-card .price-row .change-info .total { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* === Other Stocks Compact === */
  .stocks-compact {
    background: var(--bg-white);
    border: 1px solid var(--border-mid);
    border-radius: 16px;
    padding: 4px 0;
    margin-bottom: 20px;
  }
  .stocks-compact .header {
    font-size: 12px; font-weight: 600;
    color: var(--text-dim);
    padding: 12px 16px 8px;
  }
  .stock-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .stock-row .left .name { font-size: 14px; font-weight: 600; }
  .stock-row .left .industry { font-size: 11px; color: var(--text-dim); }
  .stock-row .right { text-align: right; }
  .stock-row .right .price { font-size: 14px; font-weight: 600; }
  .stock-row .right .change-pct { font-size: 12px; font-weight: 600; }
  .change.up { color: var(--red); }
  .change.down { color: var(--primary); }
  .change.neutral { color: var(--text-dim); }
  .stock-row .mini-chart-inline {
    width: 60px; height: 28px; margin: 0 12px;
  }

  /* === Big Unified Chart === */
  .unified-chart-card {
    background: var(--bg-white);
    border: 1px solid var(--border-mid);
    border-radius: 16px;
    padding: 20px 16px 16px;
    margin-bottom: 16px;
  }
  .unified-chart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .unified-chart-header .title-text {
    font-size: 14px; font-weight: 700; color: var(--text);
  }
  .unified-chart-header .week-label {
    font-size: 12px; color: var(--text-dim);
    background: var(--bg); padding: 4px 10px; border-radius: 6px;
  }
  .unified-chart-svg-wrap {
    width: 100%; height: 260px; position: relative;
    margin-bottom: 12px;
  }
  .unified-chart-svg-wrap svg { width: 100%; height: 100%; display: block; }
  
  /* 그래프 선 - 부드러운 등장 애니메이션 */
  @keyframes drawLine {
    from { stroke-dashoffset: var(--line-length); }
    to { stroke-dashoffset: 0; }
  }
  .chart-line {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .chart-line.animate {
    stroke-dasharray: var(--line-length);
    stroke-dashoffset: var(--line-length);
    animation: drawLine 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .chart-dot {
    transform-origin: center;
    transform-box: fill-box;
  }
  .chart-dot.animate {
    animation: popIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    animation-delay: 1.2s;
    opacity: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .chart-dot.pulse {
    animation: pulse 1.5s 1.5s infinite;
  }
  
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 6px 10px;
    background: var(--bg); border-radius: 8px;
    font-weight: 600;
  }
  .legend-item.owned {
    background: var(--primary-light);
    color: var(--primary-dark);
    border: 1px solid var(--primary);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-price {
    font-size: 11px; color: var(--text-dim);
    margin-left: 4px;
  }
  .legend-change {
    font-size: 11px; font-weight: 700;
    margin-left: 4px;
  }

  /* === Portfolio value flash === */
  .portfolio-bar.flash {
    animation: flashBg 0.6s;
  }
  @keyframes flashBg {
    0% { background: var(--text); }
    30% { background: #2a3441; }
    100% { background: var(--text); }
  }

  /* === Event Card === */
  .event-card {
    background: linear-gradient(135deg, #fff8e1 0%, #ffefd5 100%);
    border-radius: 16px; padding: 20px;
    margin-bottom: 20px;
    border-left: 4px solid var(--yellow);
  }
  .event-card .event-label {
    font-size: 11px; font-weight: 700;
    color: #e08e00; letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .event-card .event-title {
    font-size: 15px; font-weight: 700;
    color: var(--text); line-height: 1.4; margin-bottom: 4px;
  }
  .event-card .event-desc { font-size: 13px; color: var(--text-sub); line-height: 1.5; }
  .event-card.danger {
    background: linear-gradient(135deg, #ffe5e7 0%, #ffd0d4 100%);
    border-left-color: var(--red);
  }
  .event-card.danger .event-label { color: #c63340; }
  .event-card.message {
    background: linear-gradient(135deg, #f0f9ff 0%, #dbeefe 100%);
    border-left-color: var(--primary);
  }
  .event-card.message .event-label { color: var(--primary-dark); }
  .event-card.boom {
    background: linear-gradient(135deg, #e8f9f3 0%, #d0f5e6 100%);
    border-left-color: var(--green);
  }
  .event-card.boom .event-label { color: #007a5d; }

  /* === Action Buttons === */
  .action-section { margin-top: 20px; }
  .action-question {
    font-size: 16px; font-weight: 700;
    margin-bottom: 14px; color: var(--text);
  }
  .action-grid { display: flex; flex-direction: column; gap: 10px; }
  .action-btn {
    background: var(--bg-white);
    border: 2px solid var(--border-mid);
    border-radius: 14px; padding: 16px 18px;
    cursor: pointer; transition: all 0.15s;
    text-align: left; font-family: inherit; width: 100%;
    display: flex; align-items: center; gap: 14px;
  }
  .action-btn:active { transform: scale(0.98); }
  .action-btn:hover { border-color: var(--primary); }
  .action-btn.selected {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .action-btn .icon { font-size: 24px; flex-shrink: 0; }
  .action-btn .text { flex: 1; }
  .action-btn .text .label { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .action-btn .text .desc { font-size: 12px; color: var(--text-dim); }

  /* === Sub-choice (갈아탈 종목 선택 등) === */
  .subchoice-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 200;
  }
  .subchoice-modal.open { display: flex; }
  .subchoice-content {
    background: white; width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .subchoice-content h3 {
    font-size: 18px; font-weight: 700; margin-bottom: 6px;
  }
  .subchoice-content .desc {
    font-size: 13px; color: var(--text-dim);
    margin-bottom: 16px;
  }
  .subchoice-content .options { display: flex; flex-direction: column; gap: 8px; }
  .sub-opt {
    border: 2px solid var(--border-mid);
    border-radius: 12px; padding: 14px;
    cursor: pointer; transition: all 0.15s;
    display: flex; justify-content: space-between; align-items: center;
    background: white;
  }
  .sub-opt:active { transform: scale(0.98); }
  .sub-opt .left { font-weight: 600; font-size: 15px; }
  .sub-opt .left .sub { font-size: 11px; color: var(--text-dim); font-weight: 400; }
  .sub-opt .right { font-size: 13px; font-weight: 600; }
  .sub-opt.disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .modal-close {
    background: var(--bg); border: none;
    padding: 12px; width: 100%; border-radius: 10px;
    margin-top: 12px; cursor: pointer;
    font-family: inherit; font-size: 14px; color: var(--text-sub);
  }

  /* === Bottom CTA === */
  .bottom-cta {
    position: fixed; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    padding: 16px 24px 24px;
    background: linear-gradient(to top, var(--bg-white) 80%, rgba(255,255,255,0));
    z-index: 50;
  }
  .cta-btn {
    width: 100%;
    background: var(--primary); color: white;
    border: none; border-radius: 14px;
    padding: 17px; font-size: 16px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .cta-btn:active { transform: scale(0.99); }
  .cta-btn:disabled {
    background: var(--border-mid); color: var(--text-dim); cursor: not-allowed;
  }
  .cta-btn.secondary { background: var(--bg); color: var(--text); }

  /* === Result === */
  .result-hero { text-align: center; padding: 16px 0 20px; margin-bottom: 20px; }
  .result-emoji { font-size: 64px; margin-bottom: 12px; }
  .result-type {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--primary), #00c896);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result-subtitle { font-size: 14px; color: var(--text-sub); }
  .score-card { background: var(--bg); border-radius: 16px; padding: 22px; margin-bottom: 16px; }
  .score-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; font-size: 14px; font-weight: 600;
  }
  .score-row .label-invest { color: var(--primary); }
  .score-row .label-speculate { color: var(--red); }
  .score-bar-wrap {
    height: 12px; background: white;
    border-radius: 6px; overflow: hidden; display: flex;
  }
  .score-bar-invest {
    background: var(--primary); height: 100%;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .score-bar-speculate {
    background: var(--red); height: 100%;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .summary-card {
    background: var(--bg-white); border: 1px solid var(--border-mid);
    border-radius: 16px; padding: 22px; margin-bottom: 16px;
  }
  .summary-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .summary-card .text { font-size: 14px; color: var(--text-sub); line-height: 1.65; }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 16px;
  }
  .stat-box {
    background: var(--bg); border-radius: 12px;
    padding: 16px; text-align: center;
  }
  .stat-box .num {
    font-size: 22px; font-weight: 800;
    color: var(--primary); letter-spacing: -0.5px;
  }
  .stat-box .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* === Stock Selection (intro) === */
  .stock-card-select {
    background: var(--bg-white);
    border: 2px solid var(--border-mid);
    border-radius: 16px;
    padding: 18px; margin-bottom: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .stock-card-select:active { transform: scale(0.98); }
  .stock-card-select.selected {
    border-color: var(--primary); background: var(--primary-light);
  }
  .stock-card-select .top {
    display: flex; justify-content: space-between; margin-bottom: 8px;
  }
  .stock-card-select .name { font-size: 17px; font-weight: 700; }
  .stock-card-select .industry { font-size: 12px; color: var(--text-dim); }
  .stock-card-select .desc { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

  /* === Submit area === */
  .submit-area {
    background: var(--bg); border-radius: 16px;
    padding: 20px; margin-bottom: 16px;
    text-align: center;
  }
  .submit-area p { font-size: 13px; color: var(--text-sub); margin-bottom: 12px; }
  .form-row { margin-bottom: 12px; text-align: left; }
  .form-row label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-sub); margin-bottom: 6px;
  }
  .form-row input, .form-row select {
    width: 100%; padding: 12px;
    border: 1px solid var(--border-mid);
    border-radius: 10px; font-size: 14px;
    font-family: inherit; background: white;
  }
  .form-row input:focus, .form-row select:focus {
    outline: none; border-color: var(--primary);
  }
  .submit-status {
    font-size: 13px; margin-top: 8px;
    padding: 8px; border-radius: 8px;
  }
  .submit-status.success { background: var(--green-light); color: #007a5d; }
  .submit-status.error { background: var(--red-light); color: #c63340; }
  .submit-status.loading { background: var(--primary-light); color: var(--primary-dark); }


  /* === Clean Survey UI === */
  .survey-card {
    background: var(--bg-white);
    border: 1px solid var(--border-mid);
    border-radius: 18px;
    padding: 24px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .survey-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .survey-section {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    background: var(--primary-light);
    border-radius: 999px;
    padding: 5px 10px;
  }
  .survey-count {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .survey-question {
    font-size: 17px;
    line-height: 1.45;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }
  .survey-help {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .survey-page {
    margin-top: 16px;
  }
  .survey-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .survey-option {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    border: 1.5px solid var(--border-mid);
    border-radius: 14px;
    padding: 14px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    background: white;
  }
  .survey-option:hover { border-color: var(--primary); background: #fbfdff; }
  .survey-option input { margin-top: 3px; flex-shrink: 0; accent-color: var(--primary); }
  .survey-option span { font-size: 14px; color: var(--text); font-weight: 500; line-height: 1.45; }
  .survey-option:has(input:checked) {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .survey-other-input {
    margin-top: 12px;
    width: 100%;
    padding: 12px 13px;
    border: 1px solid var(--border-mid);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
  }
  .survey-other-input:focus { outline: none; border-color: var(--primary); }
  .survey-alert {
    display: none;
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--red-light);
    color: #c63340;
    font-size: 13px;
    font-weight: 600;
  }
  .survey-alert.show { display: block; }
  .survey-nav {
    display: grid;
    grid-template-columns: 0.8fr 1.2fr;
    gap: 10px;
  }
  .survey-nav.single { grid-template-columns: 1fr; }
  .survey-intro-card {

function getCurrentPrice(key) {

function getPortfolioValue() {
  let val = state.cash;
  if (state.ownedKey) {
    val += state.ownedShares * getCurrentPrice(state.ownedKey);
  }
  return val;
}

function updateProgress() {
  let percent = 0;
  if (state.screen === 'intro') percent = 0;
  else if (state.screen === 'select') percent = 10;
  else if (state.screen === 'round') percent = 10 + (state.currentRound + 1) * 14;
  else if (state.screen === 'result') percent = 82;
  else if (state.screen === 'survey') {
    percent = state.surveyPhase === 'common' ? 88 : 94;
  }
  else if (state.screen === 'surveySubmit' || state.screen === 'thanks') percent = 100;
  progressFill.style.width = percent + '%';

  if (state.screen === 'intro') stepIndicator.textContent = '';
  else if (state.screen === 'select') stepIndicator.textContent = '종목 선택';
  else if (state.screen === 'round') stepIndicator.textContent = `${state.currentRound + 1}주차 / 5주차`;

  else if (state.screen === 'surveySubmit' || state.screen === 'thanks') stepIndicator.textContent = '제출';

function confirmInitial() {
  const s = STOCKS[state.initialStock];
  const shares = Math.floor(state.cash / s.initialPrice);

  state.cash -= shares * s.initialPrice;

  render();
}

// ========= 라운드 =========
function renderRound() {
  const round = ROUNDS[state.currentRound];
  
  // 주가 업데이트 (라운드 첫 진입 시)
  if (priceHistory.A.length === state.currentRound + 1) {

function renderInlineChart(history) {
  if (history.length < 2) return '<div class="mini-chart-inline"></div>';
  const max = Math.max(...history), min = Math.min(...history);
  const range = max - min || 1;
  const points = history.map((v, i) => {
    const x = (i / (history.length - 1)) * 100;
    const y = 100 - ((v - min) / range) * 100;
    return `${x},${y}`;
  }).join(' ');
  const color = history[history.length-1] >= history[0] ? '#f04452' : '#3182f6';
  return `
    <div class="mini-chart-inline">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%;height:100%;">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" vector-effect="non-scaling-stroke"/>
      </svg>
    </div>
  `;
}

// === 통합 그래프: 4개 종목 다 표시 (색깔로 구분, 부드러운 애니메이션) ===

  B: '#00c896', // 초록 (안정 가치주)

};

// 매번 다른 ID로 강제 리렌더링
let chartRenderId = 0;

function renderUnifiedChart() {
  chartRenderId++;
  
  // 모든 종목의 max/min 통합
  let allValues = [];
  for (const key of ['A', 'B', 'C', 'D']) {
    allValues = allValues.concat(priceHistory[key]);
  }
  const dataMax = Math.max(...allValues);
  const dataMin = Math.min(...allValues);
  const range = dataMax - dataMin || 1;
  
  // 위아래 여유 공간 (10%)
  const yMax = dataMax + range * 0.1;
  const yMin = Math.max(0, dataMin - range * 0.1);
  const yRange = yMax - yMin;
  
  const numPoints = priceHistory.A.length;
  if (numPoints < 1) return '';
  
  // SVG 좌표 시스템
  // viewBox: 0 0 400 240
  // 차트 영역: x=50~390, y=20~200 (y축 라벨 좌측 공간 + x축 라벨 하단 공간)
  const chartLeft = 50;
  const chartRight = 390;
  const chartTop = 20;
  const chartBottom = 200;
  const chartWidth = chartRight - chartLeft;
  const chartHeight = chartBottom - chartTop;
  
  // 점 좌표 계산 함수
  const xCoord = (idx) => numPoints > 1 
    ? chartLeft + (idx / (numPoints - 1)) * chartWidth 
    : chartLeft + chartWidth / 2;
  const yCoord = (value) => chartTop + (1 - (value - yMin) / yRange) * chartHeight;
  
  // === Y축 격자선 + 가격 레이블 ===
  let yAxis = '';
  const yTicks = 4;
  for (let i = 0; i <= yTicks; i++) {
    const value = yMin + (yRange / yTicks) * (yTicks - i);
    const y = chartTop + (i / yTicks) * chartHeight;
    yAxis += `
      <line x1="${chartLeft}" y1="${y}" x2="${chartRight}" y2="${y}" 
            stroke="#e5e8eb" stroke-width="1" stroke-dasharray="2,3"/>
      <text x="${chartLeft - 8}" y="${y + 4}" text-anchor="end" 
            font-size="10" fill="#8b95a1" font-family="Pretendard">
        ${Math.round(value / 1000)}k
      </text>
    `;
  }
  
  // === X축 레이블 (주차) ===
  let xAxis = '';
  for (let i = 0; i < numPoints; i++) {
    const x = xCoord(i);
    const label = i === 0 ? '시작' : `${i}주`;
    xAxis += `
      <text x="${x}" y="${chartBottom + 16}" text-anchor="middle" 
            font-size="10" fill="#8b95a1" font-family="Pretendard">${label}</text>
    `;
  }
  
  // === 각 종목 라인 + 점 ===
  let lines = '';
  let dots = '';
  let legendItems = '';
  
  // 보유 종목은 마지막에 그려서 위에 보이게
  const orderedKeys = ['A', 'B', 'C', 'D'].sort((a, b) => {
    if (a === state.ownedKey) return 1;
    if (b === state.ownedKey) return -1;
    return 0;
  });
  
  for (const key of orderedKeys) {
    const history = priceHistory[key];
    const color = STOCK_COLORS[key];
    const isOwned = state.ownedKey === key;
    
    if (history.length >= 2) {
      // 라인 path 만들기
      let pathD = '';
      let lineLength = 0;
      let prevX = null, prevY = null;
      
      history.forEach((v, i) => {
        const x = xCoord(i);
        const y = yCoord(v);
        if (i === 0) {
          pathD += `M ${x} ${y}`;
        } else {
          pathD += ` L ${x} ${y}`;
          // 라인 길이 누적 (피타고라스)
          const dx = x - prevX, dy = y - prevY;
          lineLength += Math.sqrt(dx * dx + dy * dy);
        }
        prevX = x; prevY = y;
      });
      
      lines += `
        <path d="${pathD}" 
              class="chart-line animate"
              stroke="${color}"
              stroke-width="${isOwned ? 3.5 : 2}"
              opacity="${isOwned ? 1 : 0.55}"
              style="--line-length: ${lineLength.toFixed(0)};"/>
      `;
    } else if (history.length === 1) {
      // 첫 라운드 (1개 점만 있음)
      const x = xCoord(0);
      const y = yCoord(history[0]);
      // 그냥 점만 표시 (라인 없음)
    }
    
    // 모든 점 표시 (각 주차)
    history.forEach((v, i) => {
      const x = xCoord(i);
      const y = yCoord(v);
      const isLast = i === history.length - 1;
      dots += `
        <circle cx="${x}" cy="${y}" 
                r="${isOwned ? (isLast ? 5 : 3.5) : (isLast ? 4 : 2.5)}" 
                fill="${color}" 
                stroke="white" 
                stroke-width="${isOwned ? 2.5 : 1.5}"
                class="chart-dot animate ${isLast && isOwned ? 'pulse' : ''}"
                style="animation-delay: ${(i / Math.max(1, history.length)) * 1.2}s;"
                opacity="${isOwned ? 1 : 0.7}"/>
      `;
    });
    
    // 범례
    const s = STOCKS[key];
    const cur = getCurrentPrice(key);
    const prev = priceHistory[key].length > 1 ? priceHistory[key][priceHistory[key].length - 2] : s.initialPrice;
    const weekChg = ((cur - prev) / prev * 100).toFixed(1);
    const upDown = weekChg > 0 ? 'up' : (weekChg < 0 ? 'down' : 'neutral');
    legendItems += `
      <div class="legend-item ${isOwned ? 'owned' : ''}">
        <div class="legend-dot" style="background:${color}"></div>
        <span>${key}사</span>
        <span class="legend-price">${cur.toLocaleString()}원</span>
        <span class="legend-change change ${upDown}">${weekChg > 0 ? '+' : ''}${weekChg}%</span>
      </div>
    `;
  }
  
  return `
    <div class="unified-chart-card">
      <div class="unified-chart-header">
        <div class="title-text">📊 시장 전체 차트</div>
        <div class="week-label">${state.currentRound + 1}주차 현재</div>
      </div>
      <div class="unified-chart-svg-wrap">
        <svg viewBox="0 0 400 240" preserveAspectRatio="xMidYMid meet" 
             xmlns="http://www.w3.org/2000/svg" key="${chartRenderId}">
          ${yAxis}
          ${xAxis}
          ${lines}
          ${dots}
        </svg>
      </div>
      <div class="chart-legend">${legendItems}</div>
    </div>
  `;
}

function selectAction(id) {
  state.selectedAction = id;
  render();
}

// ========= 행동 실행 (핵심!) =========
function confirmAction() {
  const round = ROUNDS[state.currentRound];
  const action = round.actions.find(a => a.id === state.selectedAction);

  // type에 따라 실제 포트폴리오 변경
  if (action.type === 'hold') {
    executeAction(action, null);
  } else if (action.type === 'switch') {
    // 정해진 종목으로 갈아탐
    if (action.target !== state.ownedKey) {
      switchStock(action.target);
    }
    executeAction(action, action.target);
  } else if (action.type === 'switch_choose') {
    // 사용자가 B/D 중 선택
    showSwitchChoiceModal(action);
    return; // 모달 닫힌 후 실행됨
  } else if (action.type === 'switch_to_hottest') {
    // 가장 많이 오른 종목으로 자동 갈아탐
    const hottest = findHottestStock();
    if (hottest !== state.ownedKey) switchStock(hottest);
    executeAction(action, hottest);
  } else if (action.type === 'partial_sell') {
    // 절반 매도
    const sellShares = Math.floor(state.ownedShares / 2);
    state.cash += sellShares * getCurrentPrice(state.ownedKey);
    state.ownedShares -= sellShares;
    executeAction(action, null);
  } else if (action.type === 'sell_all') {
    // 전량 매도
    state.cash += state.ownedShares * getCurrentPrice(state.ownedKey);
    state.ownedShares = 0;
    state.ownedKey = null;
    executeAction(action, null);
  } else if (action.type === 'gamble') {
    // 도박: 50% 확률로 +50% or -80%, 임시로 -50%로 고정 (시뮬레이션)
    const total = getPortfolioValue();
    const newCash = Math.round(total * 0.5); // 도박 결과 -50%
    state.cash = newCash;
    state.ownedShares = 0;
    state.ownedKey = null;
    executeAction(action, 'GAMBLE');
  }
}

function switchStock(newKey) {
  // 기존 종목 전부 매도
  if (state.ownedKey && state.ownedShares > 0) {
    state.cash += state.ownedShares * getCurrentPrice(state.ownedKey);
  }
  // 새 종목 매수
  const newPrice = getCurrentPrice(newKey);
  const newShares = Math.floor(state.cash / newPrice);
  state.cash -= newShares * newPrice;
  state.ownedKey = newKey;
  state.ownedShares = newShares;
}

function findHottestStock() {
  let best = state.ownedKey, bestChg = -Infinity;
  for (const key of ['A', 'B', 'C', 'D']) {
    const cur = getCurrentPrice(key);
    const prev = priceHistory[key][priceHistory[key].length - 2] || STOCKS[key].initialPrice;
    const chg = (cur - prev) / prev;
    if (chg > bestChg) { bestChg = chg; best = key; }
  }
  return best;
}

function showSwitchChoiceModal(action) {
  const modal = document.getElementById('subchoice-modal');
  const content = document.getElementById('subchoice-content');
  let opts = '';
  action.options.forEach(key => {
    const s = STOCKS[key];
    const cur = getCurrentPrice(key);
    opts += `
      <div class="sub-opt" onclick="confirmSwitchChoice('${action.id}', '${key}')">
        <div class="left">
          ${key}사 · ${s.name}
          <div class="sub">${s.industry}</div>
        </div>
        <div class="right">${cur.toLocaleString()}원</div>
      </div>
    `;
  });
  content.innerHTML = `
    <h3>어느 종목으로 갈아탈까요?</h3>
    <div class="desc">선택한 종목으로 전량 매수합니다.</div>
    <div class="options">${opts}</div>
    <button class="modal-close" onclick="closeModal()">취소</button>
  `;
  modal.classList.add('open');
}

function confirmSwitchChoice(actionId, targetKey) {
  const round = ROUNDS[state.currentRound];
  const action = round.actions.find(a => a.id === actionId);
  closeModal();
  if (targetKey !== state.ownedKey) switchStock(targetKey);
  executeAction(action, targetKey);
}

function closeModal() {
  document.getElementById('subchoice-modal').classList.remove('open');
}

function executeAction(action, targetInfo) {
  state.scores.invest += action.score.invest;
  state.scores.speculate += action.score.speculate;
  state.actionHistory.push({
    round: state.currentRound + 1,
    actionId: action.id,
    target: targetInfo,
    invest: action.score.invest,
    speculate: action.score.speculate,
    portfolioValue: getPortfolioValue()
  });

  if (state.currentRound === 4) {
    state.screen = 'result';
    state.selectedAction = null;
    render();
  } else {
    state.currentRound++;
    state.selectedAction = null;
    render();
  }
}

    emoji = '🎲'; type = '투기 성향 우세형';

function startSurvey() {
  state.screen = 'survey';
  state.surveyPhase = 'common';
  state.surveyBranch = null;
  state.surveyAnswers = {};
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function getSurveySequence() {
  const branchAnswer = state.surveyAnswers.q9_experience?.value;
  let branch = state.surveyBranch;
  if (!branch && branchAnswer) branch = branchAnswer;

  if (branch === 'experience') return SURVEY_COMMON.concat(SURVEY_BRANCH_A);
  if (branch === 'interest') return SURVEY_COMMON.concat(SURVEY_BRANCH_B);
  return SURVEY_COMMON;
}

function getOptionValue(option) {
  return typeof option === 'string' ? option : option.value;
}
function getOptionLabel(option) {
  return typeof option === 'string' ? option : option.label;
}

// 설문은 두 페이지: 'common' (공통 9문항 한 페이지) → 'branch' (분기 추가 문항)
function renderSurvey() {
  const phase = state.surveyPhase || 'common';
  const questions = phase === 'common' ? SURVEY_COMMON : 
                    (state.surveyBranch === 'experience' ? SURVEY_BRANCH_A : SURVEY_BRANCH_B);

  let questionsHtml = questions.map(q => renderSurveyQuestionInline(q)).join('');

  const headerText = phase === 'common' 
    ? '<h1 class="title">설문조사</h1><p class="subtitle">모든 문항에 응답해주세요</p>'
    : (state.surveyBranch === 'experience' 
        ? '<h1 class="title">투자 경험자 추가 질문</h1>'
        : '<h1 class="title">비경험자 추가 질문</h1>');

  content.innerHTML = `
    ${headerText}
    <div class="survey-page">${questionsHtml}</div>
    <div id="survey-alert-global" class="survey-alert" style="margin-top:16px;">모든 항목에 응답해주세요.</div>
  `;

  bottomCta.style.display = 'block';
  bottomCta.innerHTML = `
    <button class="cta-btn" onclick="nextSurveyPhase()">${phase === 'common' ? '다음 →' : '제출 화면으로 →'}</button>
  `;
}

function renderSurveyQuestionInline(q) {
  const saved = state.surveyAnswers[q.id];
  const currentValues = q.type === 'multi' ? (saved?.value || []) : [saved?.value].filter(Boolean);
  const otherValue = saved?.other || '';

  const optionsHtml = q.options.map((opt) => {
    const value = getOptionValue(opt);
    const label = getOptionLabel(opt);
    const checked = currentValues.includes(value) ? 'checked' : '';
    const inputType = q.type === 'multi' ? 'checkbox' : 'radio';
    return `
      <label class="survey-option">
        <input type="${inputType}" name="${q.id}" value="${escapeAttr(value)}" ${checked}>
        <span>${label}</span>
      </label>
    `;
  }).join('');

  const otherHtml = q.hasOther ? `
    <input class="survey-other-input" id="other-${q.id}" type="text" placeholder="기타 내용을 입력해주세요" value="${escapeAttr(otherValue)}">
  ` : '';

  return `
    <div class="survey-card" data-qid="${q.id}">
      <div class="survey-question">${q.title}</div>
      ${q.help ? `<div class="survey-help">${q.help}</div>` : ''}
      <div class="survey-options">${optionsHtml}</div>
      ${otherHtml}
    </div>
  `;
}

function escapeAttr(value) {
  return String(value ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function collectInlineAnswer(q) {
  const checked = [...document.querySelectorAll(`input[name="${q.id}"]:checked`)];
  if (checked.length === 0) return null;
  const otherInput = document.getElementById(`other-${q.id}`);
  const other = otherInput ? otherInput.value.trim() : '';
  if (q.type === 'multi') return { value: checked.map(x => x.value), other };
  return { value: checked[0].value, other };
}

function nextSurveyPhase() {
  const phase = state.surveyPhase || 'common';
  const questions = phase === 'common' ? SURVEY_COMMON : 
                    (state.surveyBranch === 'experience' ? SURVEY_BRANCH_A : SURVEY_BRANCH_B);

  // 모든 문항 검증
  let allAnswered = true;
  let firstUnanswered = null;
  for (const q of questions) {
    const ans = collectInlineAnswer(q);
    if (!ans) {
      allAnswered = false;
      if (!firstUnanswered) firstUnanswered = q.id;
      continue;
    }
    state.surveyAnswers[q.id] = ans;
    if (q.id === 'q9_experience') state.surveyBranch = ans.value;
  }

  if (!allAnswered) {
    const alert = document.getElementById('survey-alert-global');
    if (alert) alert.classList.add('show');
    // 미응답 문항으로 스크롤
    if (firstUnanswered) {
      const el = document.querySelector(`[data-qid="${firstUnanswered}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    return;
  }

  if (phase === 'common') {
    state.surveyPhase = 'branch';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  } else {
    state.screen = 'surveySubmit';
    render();
  }
}

function backToLastSurveyQuestion() {
  state.screen = 'survey';
  state.surveyPhase = state.surveyBranch ? 'branch' : 'common';
  render();
}

function buildSubmissionData() {
  const total = state.scores.invest + state.scores.speculate;
  const investPct = total > 0 ? Math.round(state.scores.invest / total * 100) : 50;
  const portfolioValue = getPortfolioValue();
  const finalChg = ((portfolioValue - 1000000) / 1000000 * 100).toFixed(1);
  const getActionForRound = (roundNum) => {
    const h = state.actionHistory.find(x => x.round === roundNum);
    return h ? h.actionId : '';
  };
  const getTargetForRound = (roundNum) => {
    const h = state.actionHistory.find(x => x.round === roundNum);
    if (!h) return '';
    if (h.target === 'GAMBLE') return 'GAMBLE';
    return h.target || '';
  };

  const flatAnswers = {};
  Object.entries(state.surveyAnswers).forEach(([key, ans]) => {
    flatAnswers[key] = Array.isArray(ans.value) ? ans.value.join(' | ') : ans.value;
    if (ans.other) flatAnswers[`${key}_other`] = ans.other;
  });

  // 추첨용 정보 수집 (선택)
  const prizeContact = document.getElementById('prize-contact')?.value.trim() || '';

  return {
    timestamp: new Date().toISOString(),
    surveyBranch: state.surveyBranch || 'none',
    prizeContact: prizeContact,
    ...flatAnswers,
    initialStock: state.initialStock,
    finalStock: state.ownedKey || 'CASH',
    action_round1: getActionForRound(1),
    action_round2: getActionForRound(2),
    action_round3: getActionForRound(3),
    action_round4: getActionForRound(4),
    action_round5: getActionForRound(5),
    target_round1: getTargetForRound(1),
    target_round2: getTargetForRound(2),
    target_round3: getTargetForRound(3),
    target_round4: getTargetForRound(4),
    target_round5: getTargetForRound(5),
    investScore: state.scores.invest,
    speculateScore: state.scores.speculate,
    investPercent: investPct,
    speculatePercent: 100 - investPct,
    finalPortfolio: portfolioValue,
    returnPercent: parseFloat(finalChg),
    durationSec: Math.round((Date.now() - state.startTime) / 1000)
  };
}

function submitSurveyResponse() {
  // 중복 제출 방지
  if (state.isSubmitting) return;
  state.isSubmitting = true;

  const statusEl = document.getElementById('submit-status');
  const data = buildSubmissionData();

  // 제출 버튼 비활성화
  const submitBtn = document.querySelector('.bottom-cta .cta-btn:not(.secondary)');
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.textContent = '제출 중...';
    submitBtn.style.opacity = '0.6';
  }

  if (!GOOGLE_SCRIPT_URL) {
    statusEl.className = 'submit-status success';
    statusEl.textContent = '✓ 응답 완료! 자동 저장 URL이 비어 있어 브라우저에서만 완료 처리되었습니다.';
    setTimeout(() => { state.screen = 'thanks'; render(); }, 600);
    return;
  }

  statusEl.className = 'submit-status loading';
  statusEl.textContent = '⏳ 제출 중...';

  fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(() => {
    state.screen = 'thanks';
    render();
  }).catch(err => {
    state.isSubmitting = false; // 실패 시 재시도 허용
    statusEl.className = 'submit-status error';
    statusEl.textContent = '⚠️ 제출 실패. 다시 시도해주세요.';
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.textContent = '제출하기';
      submitBtn.style.opacity = '1';
    }
    console.error(err);
  });
}

  content.innerHTML = `
    <div class="survey-submit-card">

      <h2>응답이 제출되었습니다</h2>

    </div>
  `;
  bottomCta.style.display = 'block';
  bottomCta.innerHTML = `<button class="cta-btn secondary" onclick="restart()">처음부터 다시 하기 🔄</button>`;
}

function restart() {
  for (const key in STOCKS) {
    priceHistory[key] = [STOCKS[key].initialPrice];
  }
  state = {
    screen: 'intro',
    initialStock: null,
    ownedKey: null,
    ownedShares: 0,
    cash: 1000000,
    currentRound: 0,
    selectedAction: null,
    pendingSwitchTarget: null,
    actionHistory: [],
    scores: { invest: 0, speculate: 0 },
    startTime: Date.now(),
    surveyPhase: 'common',
    surveyBranch: null,
    surveyAnswers: {},
    isSubmitting: false
  };
  render();
}
